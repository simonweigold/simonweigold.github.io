<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Attributes Game</title>
    <link rel="stylesheet" href="css/attributes-game.css">
</head>
<body>
    <div class="container">
        <h1>Build Your Ideal Partner</h1>
        <div class="form-group">
            <label for="partner-name">Partner Name:</label>
            <input type="text" id="partner-name">
        </div>
        <div class="form-group">
            <label for="budget">Budget:</label>
            <input type="number" id="budget" value="300">
        </div>
        <div id="attributes-list">
            <h3>Available Attributes:</h3>
        </div>
        <button id="finish-button">Finish</button>
        <div id="selected-attributes">
            <h3>Selected Attributes:</h3>
        </div>
        <div id="result"></div>
    </div>
    <script src="js/attributes-game.js"></script>
</body>
</html>
